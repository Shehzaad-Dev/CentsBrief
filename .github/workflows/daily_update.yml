name: Daily Finance Brief Update

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily brief
        env:
          GROQ_API_KEY: ${{ secrets.GroqAPI }}
          GROQ_MODEL: llama-3.3-70b-versatile
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          SITE_BASE_URL: https://centsbreif.online
        run: python main.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add --all index.html brief-*.html briefs/*.html sitemap.xml robots.txt
            # Add deleted files manually based on pattern since bash might not expand deleted files to add
            git ls-files --deleted | grep -E "brief-|briefs/" | xargs -r git rm
            git commit -m "chore: publish daily automated finance brief and clean up archive"
            git push
          else
            echo "No changes detected."
          fi
